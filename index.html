<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="wrapper">
  <div class="conteiner">
    <header class="header">
      <img src="./images/logo.svg" alt="лого" class="header__logo">
    </header>

    <main class="main">
      <section class="profile">
        <div class="profile__info">
          <img src="./images/avatar.jpg" alt="Аватар" class="profile__avatar">
          <div class="profile__bio">
            <h1 class="profile__name">Имя</h1>
            <button type="button" class="profile__edit-button"></button>
            <p class="profile__job">О себе</p>
          </div>
        </div>
        <button type="button" class="profile__add-button">
        </button>
      </section>

      <section class="cards">
        <ul class="cards__list">

        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__author">&copy; 2022 Mesto Russia</p>
    </footer>
    <div class="popup popup_type_add-card">
      <div class="conteiner__popup">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__title">Новое место</h2>
        <form action="" class="popup__form" name="popupFormCard" novalidate>
          <div class="popup__section">
            <input name="cardName" id="cardName-input" type="text" class="popup__input popup__input_form_card-name"
              placeholder="Название" minlength="3" maxlength="30" required>
            <span class="popup__error cardName-input-error"></span>
          </div>
          <div class="popup__section">
            <input name="cardLink" id="cardLink-input" type="url" class="popup__input popup__input_form_card-link"
              placeholder="Ссылка на картинку" required>
            <span class="popup__error cardLink-input-error"></span>
          </div>
          <button type="submit" class="popup__btn">Создать</button>
        </form>
      </div>
    </div>
    <div class="popup popup_type_profile">
      <div class="conteiner__popup">
        <button class="popup__close" type="button"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form action="" class="popup__form" name="popupFormProfile">
          <div class="popup__section">
            <input name="userName" id="userName-input" type="text" class="popup__input popup__input_form_user-name"
              placeholder="Имя" minlength="2" maxlength="40" required>
            <span class="popup__error userName-input-error"></span>
          </div>
          <div class="popup__section">
            <input name="userJob" id="userJob-input" type="text" class="popup__input popup__input_form_user-job"
              placeholder="Профессия" minlength="2" maxlength="40" required>
            <span class="popup__error userJob-input-error"></span>
          </div>
          <button type="submit" class="popup__btn">Сохранить</button>
        </form>
      </div>
    </div>
    <div class="popup popup_type_big-img">
      <div class="conteiner__popup-big-img">
        <button class="popup__close" type="button"></button>
        <img src="#" alt="" class="popup__img">
        <h2 class="popup__text"></h2>
      </div>
    </div>
  </div>
  <template id="card-template">
    <li class="card">
      <button type="button" class="card__delete"></button>
      <img src="#" alt="" class="card__img">
      <div class="card__title">
        <h2 class="card__name"></h2>
        <button type="button" class="card__like-button"></button>
      </div>
    </li>
  </template>
  <script src="./scripts/initial-сards.js"></script>
  <script src="./scripts/validate.js"></script>
  <script src="./scripts/index.js"></script>
</body>

</html>
