<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="wrapper">
  <div class="conteiner">
    <header class="header">
      <img src="./images/logo.svg" alt="лого" class="header__logo">
    </header>

    <main class="main">
      <section class="profile">
        <div class="profile__info">
          <img src="./images/avatar.jpg" alt="Аватар" class="profile__avatar">
          <div class="profile__bio">
            <h1 class="profile__name">Имя</h1>
            <button type="button" class="profile__edit-button"></button>
            <p class="profile__job">О себе</p>
          </div>
        </div>
        <button type="button" class="profile__add-button">
        </button>
      </section>

      <section class="cards">
        <ul class="cards__list">
          <template id="card-template">
            <li class="card">
              <img src="./images/Trash.svg" alt="удалить" class="card__delete">
              <img src="" alt="" class="card__img">
              <div class="card__title">
                <h2 class="card__name"></h2>
                <button type="button" class="card__like-button"></button>
              </div>
            </li>
          </template>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__author">&copy; 2022 Mesto Russia</p>
    </footer>

    <div class="popup popup__profile-edit">
      <div class="popup__conteiner">
        <button class="popup__close popup__close_profile-edit" type="button"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form action="" class="popup__form popup__form_profile-edit" name="popupForm">
          <input name="userName" type="text" class="popup__input popup__input_form_user-name" placeholder="Имя"
            required>
          <input name="userJob" type="text" class="popup__input popup__input_form_user-job" placeholder="Профессия"
            required>
          <button type="submit" class="popup__save">Сохранить</button>
        </form>
      </div>
    </div>
    <div class="popup popup__add-card">
      <div class="popup__conteiner">
        <button class="popup__close popup__close_add-card" type="button"></button>
        <h2 class="popup__title">Новое место</h2>
        <form action="" class="popup__form popup__form_add-card" name="popupForm">
          <input name="cardName" type="text" class="popup__input popup__input_form_card-name" placeholder="Название"
            required>
          <input name="cardLinl" type="text" class="popup__input popup__input_form_card-link"
            placeholder="Ссылка на картинку" required>
          <button type="submit" class="popup__save">Создать</button>
        </form>
      </div>
    </div>
    <div class="popup popup__big-img">
      <div class="popup__conteiner_big-img">
        <button class="popup__close popup__close_img" type="button"></button>
        <img src="" alt="" class="popup__img">
        <h2 class="popup__text"></h2>
      </div>
    </div>
  </div>
  <script src="./scripts/index.js"></script>
</body>

</html>
