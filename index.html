<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Mesto</title>
</head>

<body class="wrapper">
  <div class="conteiner">
    <header class="header">
      <img src="./images/logo.svg" alt="лого" class="header__logo">
    </header>

    <main class="main">
      <div class="popup">
        <div class="popup__conteiner">
          <div class="popup__body">
            <button class="popup__close"></button>
            <h2 class="popup__title">Редактировать профиль</h2>
            <form action="" class="popup__form">
              <input type="text" value="" class="popup__input_name">
              <input type="text" class="popup__input_job">
              <button type="submit" class="popup__save">Сохранить</button>
            </form>
          </div>
        </div>
      </div>

      <section class="profile">
        <div class="profile__info">
          <img src="./images/avatar.jpg" alt="Аватар" class="profile__avatar">
          <div class="profile__bio">
            <h1 class="profile__name">Имя</h1>
            <button type="button" class="profile__edit-button"></button>
            <p class="profile__job">О себе</p>
          </div>
        </div>
        <button type="button" class="profile__add-button">
        </button>
      </section>

      <section class="elements">
        <ul class="elements__list">
          <li class="element">
            <img src="./images/element/Karachayevsk.jpg" alt="Карачевск" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Карачаевск</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
          <li class="element">
            <img src="./images/element/Mount_Elbrus.jpg" alt="Гора Эльбрус" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Гора Эльбрус</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
          <li class="element">
            <img src="./images/element/Dombay.png" alt="Домбай" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Домбай</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
          <li class="element">
            <img src="./images/element/Sheregesh.jpg" alt="Шерегеш" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Шерегеш</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
          <li class="element">
            <img src="./images/element/Altai.jpg" alt="Алтай" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Алтай</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
          <li class="element">
            <img src="./images/element/Baikal.jpg" alt="Байклал" class="element__img">
            <div class="element__title">
              <h2 class="element__name">Байклал</h2>
              <button type="button" class="element__like-button like__button"></button>
            </div>
          </li>
        </ul>
      </section>
    </main>

    <footer class="footer">
      <p class="footer__author">&copy; 2022 Mesto Russia</p>
    </footer>
  </div>
  <script src="./pages/index.js"></script>
</body>

</html>
